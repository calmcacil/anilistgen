version: "3.9"

services:
  animelistgen:
    image: ghcr.io/calmcacil/animelistgen:latest
    container_name: animelistgen
    restart: unless-stopped
    environment:
      # Required
      - ALG_MDBLIST_API_KEY=${ALG_MDBLIST_API_KEY:-}

      # Sync schedule — "0" for one-shot, "24h" for daily daemon
      - ALG_INTERVAL=${ALG_INTERVAL:-24h}

      # AniList query settings
      - ALG_ANILIST_YEARS=${ALG_ANILIST_YEARS:-2026,2027}
      - ALG_ANILIST_SEASONS=${ALG_ANILIST_SEASONS:-all}
      - ALG_ANILIST_MAX_PER_SEASON=${ALG_ANILIST_MAX_PER_SEASON:-100}
      - ALG_ANILIST_INCLUDE_ONA=${ALG_ANILIST_INCLUDE_ONA:-true}

      # MDBList list settings
      - ALG_MDBLIST_TITLE_TEMPLATE=${ALG_MDBLIST_TITLE_TEMPLATE:-Anime {season} {year}}
      - ALG_MDBLIST_DESCRIPTION_TEMPLATE=${ALG_MDBLIST_DESCRIPTION_TEMPLATE:-All anime TV series airing in {season} {year}, sourced from AniList. Generated by animelistgen.}
      - ALG_MDBLIST_PUBLIC=${ALG_MDBLIST_PUBLIC:-true}
      - ALG_MDBLIST_BLACKLIST=${ALG_MDBLIST_BLACKLIST:-}

      # Logging
      - ALG_LOG_LEVEL=${ALG_LOG_LEVEL:-info}

    # Optional: mount a config file if you prefer YAML over env vars
    # volumes:
    #   - ./animelistgen.yaml:/etc/animelistgen/animelistgen.yaml:ro
