version: "3.9"

services:
  anilistgen:
    image: ghcr.io/calmcacil/anilistgen:latest
    container_name: anilistgen
    restart: unless-stopped
    # Run as non-root user (uid 65534 matches distroless:nonroot).
    # Override with your own user ID if needed.
    user: "65534:65534"
    environment:
      # Required
      - ALG_MDBLIST_API_KEY=${ALG_MDBLIST_API_KEY:-}

      # Sync schedule — "168h" for weekly, "24h" for daily, "0" for one-shot
      - ALG_INTERVAL=${ALG_INTERVAL:-168h}

      # Run on container start (default: true). Set to false to wait for first interval.
      - ALG_RUN_ON_START=${ALG_RUN_ON_START:-true}

      # Path for last-run timestamp and item cache (sanity check against rapid restarts)
      # Mount a volume at /data to persist across container recreations
      - ALG_STATE_FILE=${ALG_STATE_FILE:-/tmp/anilistgen.lastrun}

      # AniList query settings
      - ALG_ANILIST_YEARS=${ALG_ANILIST_YEARS:-2026,2027}
      - ALG_ANILIST_SEASONS=${ALG_ANILIST_SEASONS:-all}
      - ALG_ANILIST_MAX_PER_SEASON=${ALG_ANILIST_MAX_PER_SEASON:-100}
      - ALG_ANILIST_INCLUDE_ONA=${ALG_ANILIST_INCLUDE_ONA:-true}
      - ALG_ANILIST_WINTER_OVERFLOW=${ALG_ANILIST_WINTER_OVERFLOW:-false}
      - ALG_ANILIST_EXCLUDE_TAGS=${ALG_ANILIST_EXCLUDE_TAGS:-}

      # MDBList list settings
      - ALG_MDBLIST_TITLE_TEMPLATE=${ALG_MDBLIST_TITLE_TEMPLATE:-Anime {season} {year}}
      - ALG_MDBLIST_DESCRIPTION_TEMPLATE=${ALG_MDBLIST_DESCRIPTION_TEMPLATE:-All anime TV series airing in {season} {year}, sourced from AniList. Generated by anilistgen.}
      - ALG_MDBLIST_PUBLIC=${ALG_MDBLIST_PUBLIC:-true}
      - ALG_MDBLIST_BLACKLIST=${ALG_MDBLIST_BLACKLIST:-}

      # Logging
      - ALG_LOG_LEVEL=${ALG_LOG_LEVEL:-info}

    # Option A: pure env-var config (no config file needed)
    # ──────────────────────────────────────────────────────
    # All settings can be configured via the ALG_* env vars above.
    # No file mount required.

    # Option B: YAML config file bind mount
    # ──────────────────────────────────────────────────────
    # Uncomment to use a YAML config file at /etc/anilistgen/anilistgen.yaml.
    # Overrides any ALG_* env vars with matching keys (ALG_* takes precedence).
    # volumes:
    #   - ./anilistgen.yaml:/etc/anilistgen/anilistgen.yaml:ro
    # command: ["-config", "/etc/anilistgen/anilistgen.yaml"]

    # Optionally persist the state file and item cache across container recreations:
    # volumes:
    #   - anilistgen_data:/data

volumes:
  anilistgen_data:
