version: 2

project_name: anilistgen

builds:
  - id: anilistgen
    main: ./cmd/anilistgen
    binary: anilistgen
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: binary
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE*
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge branch

release:
  github:
    owner: calmcacil
    name: anilistgen
  prerelease: auto
  make_latest: true

dockers_v2:
  - images:
      - ghcr.io/calmcacil/anilistgen
    tags:
      - "v{{ .Version }}"
      - "{{ .Major }}.{{ .Minor }}"
      - latest
    dockerfile: Dockerfile.goreleaser
    build_flag_templates:
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/calmcacil/anilistgen"
    extra_files:
      - go.mod
      - go.sum
